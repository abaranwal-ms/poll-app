apiVersion: v1
kind: ConfigMap
metadata:
  name: voter-code
data:
  app.py: |
    from flask import Flask, jsonify, request
    import os, sys, redis

    app = Flask(__name__)

    REDIS_HOST = os.getenv('REDIS_HOST', 'host.docker.internal')
    REDIS_PORT = int(os.getenv('REDIS_PORT', '7001'))
    POLL_KEY = 'poll_votes'
    VALID_OPTIONS = ['Python', 'JavaScript', 'Go', 'Rust']

    _redis = None

    def get_redis():
        global _redis
        if _redis:
            try:
                _redis.ping()
                return _redis
            except Exception:
                _redis = None
        r = redis.Redis(host=REDIS_HOST, port=REDIS_PORT, decode_responses=True)
        try:
            r.hgetall(POLL_KEY)
            _redis = r
            return r
        except redis.exceptions.ResponseError as e:
            if 'MOVED' in str(e):
                target_port = int(str(e).split(':')[-1])
                r = redis.Redis(host=REDIS_HOST, port=target_port, decode_responses=True)
                _redis = r
                return r
            raise

    def init_poll():
        r = get_redis()
        for opt in VALID_OPTIONS:
            if not r.hexists(POLL_KEY, opt):
                r.hset(POLL_KEY, opt, 0)
        print(f"Redis connected at {REDIS_HOST}:{r.connection_pool.connection_kwargs['port']}")

    @app.route('/')
    def status():
        return f"Voter DB is LIVE on pod: {os.getenv('HOSTNAME')}"

    @app.route('/poll', methods=['GET', 'POST'])
    def poll():
        pod = os.getenv('HOSTNAME', 'unknown')
        r = get_redis()
        if request.method == 'POST':
            vote = request.args.get('vote') or request.form.get('vote', '')
            if vote in VALID_OPTIONS:
                r.hincrby(POLL_KEY, vote, 1)
                results = {k: int(v) for k, v in r.hgetall(POLL_KEY).items()}
                return jsonify(pod=pod, voted_for=vote, poll=results)
            return jsonify(pod=pod, error=f"Invalid option: {vote}", options=VALID_OPTIONS), 400
        results = {k: int(v) for k, v in r.hgetall(POLL_KEY).items()}
        return jsonify(pod=pod, poll=results)

    @app.route('/crash')
    def crash():
        print("Simulating a fatal error...")
        sys.exit(1)

    if __name__ == "__main__":
        init_poll()
        app.run(host='0.0.0.0', port=5000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voter-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: voter
  template:
    metadata:
      labels:
        app: voter
    spec:
      containers:
      - name: python-voter
        image: python:3.9-slim
        imagePullPolicy: IfNotPresent
        command: ["python", "-c", "import os; f=open('app.py','w'); f.write(os.environ['CODE']); f.close(); os.system('pip install flask redis && python app.py')"]
        env:
        - name: REDIS_HOST
          value: "host.docker.internal"
        - name: REDIS_PORT
          value: "7001"
        - name: CODE
          valueFrom:
            configMapKeyRef:
              name: voter-code
              key: app.py
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: voter-service
spec:
  type: LoadBalancer
  selector:
    app: voter
  ports:
    - port: 80
      targetPort: 5000